name: Documentation and Code Coverage

on:
  # Runs on pushes and pull requests
  push:
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  CC: clang
  CXX: clang++

permissions:
  actions: read
  contents: read

concurrency:
  group: "documentation-coverage-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
    - uses: actions/checkout@v4
    - name: Restore clang-binaries cache
      id: clang-binaries-cache
      uses: actions/cache/restore@v4
      with:
        path: _Build/_PackagesCache/clang-binaries
        key: sc-packages-docs-clang-binaries-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Tools/SC-package-versions.txt') }}
        restore-keys: |
          sc-packages-docs-clang-binaries-v2-${{ runner.os }}-${{ runner.arch }}-
    - name: Restore doxygen cache
      id: doxygen-cache
      uses: actions/cache/restore@v4
      with:
        path: _Build/_PackagesCache/doxygen
        key: sc-packages-docs-doxygen-v2-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Tools/SC-package-versions.txt') }}
        restore-keys: |
          sc-packages-docs-doxygen-v2-${{ runner.os }}-${{ runner.arch }}-
    - name: Restore doxygen-awesome-css cache
      id: doxygen-awesome-css-cache
      uses: actions/cache/restore@v4
      with:
        path: _Build/_PackagesCache/doxygen-awesome-css
        key: sc-packages-docs-doxygen-awesome-css-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Tools/SC-package-versions.txt') }}
        restore-keys: |
          sc-packages-docs-doxygen-awesome-css-${{ runner.os }}-${{ runner.arch }}-
    - name: Generate Single File Libs (Python)
      run: python3 Support/SingleFileLibs/python/amalgamate_single_file_libs.py
    - name: Generate Single File Libs (Javascript)
      run: node Support/SingleFileLibs/javascript/cli.js --repo-root . --ref HEAD --all --out _Build/_SingleFileLibrariesJS
    - name: install system dependencies
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          graphviz \
          liburing-dev \
          libgles2-mesa-dev \
          libx11-dev \
          libxi-dev \
          libxcursor-dev
    - name: Check Dependencies
      run: python3 Support/Dependencies/update_dependencies.py --check
    - name: Generate Dependencies
      run: python3 Support/Dependencies/update_dependencies.py
    - name: Check if Single File Libs are equal
      run: python3 Support/SingleFileLibs/check_if_equal.py _Build/_SingleFileLibraries _Build/_SingleFileLibrariesJS
    - name: clang-format
      run: ./SC.sh format check
    - name: build documentation
      run: ./SC.sh build documentation
    - name: configure
      run: ./SC.sh build configure SCTest
    - name: compile
      run: ./SC.sh build compile SCTest DebugCoverage
    - name: test SCTest
      run: ./SC.sh build run SCTest DebugCoverage -- --all-tests
    - name: coverage
      run: ./SC.sh build coverage SCTest DebugCoverage
    - name: move coverage to documentation
      run: mv _Build/_Coverage/coverage _Build/_Documentation/docs
    - name: fix documentation permissions
      run: chmod -v -R +rX "_Build/_Documentation/docs"
    - name: build SCExample
      run: ./SC.sh build compile SCExample
    - name: Save clang-binaries cache
      if: always() && steps.clang-binaries-cache.outputs.cache-hit != 'true' && hashFiles('_Build/_PackagesCache/clang-binaries/**') != ''
      uses: actions/cache/save@v4
      with:
        path: _Build/_PackagesCache/clang-binaries
        key: ${{ steps.clang-binaries-cache.outputs.cache-primary-key }}
    - name: Save doxygen cache
      if: always() && steps.doxygen-cache.outputs.cache-hit != 'true' && hashFiles('_Build/_PackagesCache/doxygen/**') != ''
      uses: actions/cache/save@v4
      with:
        path: _Build/_PackagesCache/doxygen
        key: ${{ steps.doxygen-cache.outputs.cache-primary-key }}
    - name: Save doxygen-awesome-css cache
      if: always() && steps.doxygen-awesome-css-cache.outputs.cache-hit != 'true' && hashFiles('_Build/_PackagesCache/doxygen-awesome-css/**') != ''
      uses: actions/cache/save@v4
      with:
        path: _Build/_PackagesCache/doxygen-awesome-css
        key: ${{ steps.doxygen-awesome-css-cache.outputs.cache-primary-key }}
    - name: Upload documentation artifact
      if: always() && hashFiles('_Build/_Documentation/docs/**') != ''
      uses: actions/upload-artifact@v4
      with:
        name: sane-cpp-documentation
        path: "_Build/_Documentation/docs"

  timing-summary:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()

    steps:
    - uses: actions/checkout@v4
    - name: Print CI timing summary
      env:
        GH_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: python3 Support/Scripts/PrintGitHubActionsTimingSummary.py
