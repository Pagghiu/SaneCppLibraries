name: Windows

on:
  push:
  pull_request:

jobs:
  package-warmup:
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4
    - name: Restore LLVM package cache
      id: llvm-cache
      uses: actions/cache/restore@v4
      with:
        path: _Build/_PackagesCache/llvm
        key: sc-packages-windows-llvm-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Tools/SC-package-versions.txt') }}
        restore-keys: |
          sc-packages-windows-llvm-v3-${{ runner.os }}-${{ runner.arch }}-
          sc-packages-windows-llvm-v2-${{ runner.os }}-${{ runner.arch }}-
    - name: Warm packaged LLVM toolchain
      if: steps.llvm-cache.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        call SC.bat package install llvm
    - name: Prune LLVM package cache
      if: steps.llvm-cache.outputs.cache-hit != 'true'
      shell: bash
      run: ./Support/Scripts/PruneLLVMPackageCache.sh .
    - name: Save LLVM package cache
      if: always() && steps.llvm-cache.outputs.cache-hit != 'true' && hashFiles('_Build/_PackagesCache/llvm/**') != ''
      uses: actions/cache/save@v4
      with:
        path: _Build/_PackagesCache/llvm
        key: ${{ steps.llvm-cache.outputs.cache-primary-key }}

  build:
    needs: package-warmup
    strategy:
      matrix:
        config: [ Debug, Release ]
        params: [ { os: windows-2022, generator: vs2022 },
                  { os: windows-2025, generator: vs2022 } ]
    runs-on: ${{ matrix.params.os }}
    timeout-minutes: 12

    steps:
    - uses: actions/checkout@v4
    - name: Restore LLVM package cache
      id: llvm-cache
      if: matrix.config == 'Release'
      uses: actions/cache/restore@v4
      with:
        path: _Build/_PackagesCache/llvm
        key: sc-packages-windows-llvm-v3-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Tools/SC-package-versions.txt') }}
        restore-keys: |
          sc-packages-windows-llvm-v3-${{ runner.os }}-${{ runner.arch }}-
          sc-packages-windows-llvm-v2-${{ runner.os }}-${{ runner.arch }}-
    - name: Prune restored LLVM package cache
      if: matrix.config == 'Release'
      shell: bash
      run: ./Support/Scripts/PruneLLVMPackageCache.sh .
    - name: Generate Single File Libs (Python)
      run: python3 Support/SingleFileLibs/python/amalgamate_single_file_libs.py
    - name: configure SCTest
      shell: cmd
      run: SC.bat build configure SCTest ${{ matrix.config }} ${{ matrix.params.generator }}
    - name: configure SCSingleFileLibs
      shell: cmd
      run: SC.bat build configure "SCSingleFileLibs:" ${{ matrix.config }} ${{ matrix.params.generator }}
    - name: compile SCSingleFileLibs
      shell: cmd
      run: SC.bat build compile "SCSingleFileLibs:" ${{ matrix.config }} ${{ matrix.params.generator }}
    - name: compile SCTest
      shell: cmd
      run: SC.bat build compile SCTest ${{ matrix.config }} ${{ matrix.params.generator }}
    - name: compile SCBuildTest
      shell: cmd
      run: SC.bat build compile SCBuildTest ${{ matrix.config }} ${{ matrix.params.generator }}
      if: matrix.config == 'Release'
    - name: compile InteropSTL
      shell: cmd
      run: SC.bat build compile InteropSTL ${{ matrix.config }} ${{ matrix.params.generator }}
    - name: test SCTest
      shell: cmd
      run: SC.bat build run SCTest ${{ matrix.config }} ${{ matrix.params.generator }} -- --all-tests
    - name: test SCBuildTest
      shell: cmd
      run: SC.bat build run SCBuildTest ${{ matrix.config }} ${{ matrix.params.generator }}
      if: matrix.config == 'Release'
    - name: test InteropSTL
      shell: cmd
      run: SC.bat build run InteropSTL ${{ matrix.config }} ${{ matrix.params.generator }}
